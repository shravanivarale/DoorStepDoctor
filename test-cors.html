<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
</head>
<body>
    <h1>CORS Test</h1>
    <button onclick="testCORS()">Test Login API</button>
    <pre id="result"></pre>

    <script>
        async function testCORS() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = 'Testing...';
            
            try {
                const response = await fetch('https://mrl5y4bb52.execute-api.ap-south-1.amazonaws.com/development/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'asha_worker_001',
                        password: 'demo123'
                    })
                });
                
                const data = await response.json();
                resultEl.textContent = '✅ SUCCESS!\n\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultEl.textContent = '❌ ERROR:\n\n' + error.message;
            }
        }
    </script>
</body>
</html>
