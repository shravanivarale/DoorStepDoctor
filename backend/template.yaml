AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Triage Engine for ASHA Workers - Serverless Backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        ENABLE_DETAILED_LOGGING: 'true'
        SESSION_TIMEOUT_MINUTES: '30'
        MAX_RETRIES: '3'
        TARGET_COST_PER_TRIAGE: '2.0'
        ENABLE_COST_TRACKING: 'true'
        TARGET_RESPONSE_TIME_MS: '2000'
        MAX_CONCURRENT_REQUESTS: '100'
        PHC_NOTIFICATION_ENABLED: 'true'
        EMERGENCY_CONTACT_NUMBER: '108'
        AUTO_ESCALATION_THRESHOLD: '0.8'
    Tracing: Active
    # ── P1-6: VPC Isolation for all Lambda functions ──
    # Restricts internet egress directly, forcing traffic through a NAT Gateway or VPC Endpoints
    # VPC is OPTIONAL - Uncomment below if you have VPC configured
    # VpcConfig:
    #   SecurityGroupIds: !Ref LambdaSecurityGroupIds
    #   SubnetIds: !Ref LambdaSubnetIds
    Architectures:
      - arm64

Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues:
      - development
      - staging
      - production
    Description: Deployment environment
  
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Amazon Bedrock model ID
  
  BedrockKnowledgeBaseId:
    Type: String
    Description: Amazon Bedrock Knowledge Base ID
  
  BedrockGuardrailId:
    Type: String
    Default: ''
    Description: Amazon Bedrock Guardrail ID (optional)
  
  CognitoUserPoolId:
    Type: String
    Description: Amazon Cognito User Pool ID
  
  CognitoClientId:
    Type: String
    Description: Amazon Cognito Client ID
  
  S3BucketName:
    Type: String
    Default: asha-triage-storage
    Description: S3 bucket for voice recordings and documents

  # VPC Parameters (OPTIONAL - only needed if using VPC isolation)
  # Uncomment if you want to deploy Lambda functions in a VPC
  # LambdaSecurityGroupIds:
  #   Type: CommaDelimitedList
  #   Description: List of Security Group IDs for Lambda functions
  #   Default: ""
  # 
  # LambdaSubnetIds:
  #   Type: CommaDelimitedList
  #   Description: List of Subnet IDs for Lambda functions
  #   Default: ""

Resources:
  # ── P1-5: Medical Audio Lifecycle & Encryption ──
  AudioStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: AutoDeleteAudio
            Status: Enabled
            ExpirationInDays: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
  # API Gateway
  TriageApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          DataTraceEnabled: false
          MetricsEnabled: true
          ThrottlingBurstLimit: 1000
          ThrottlingRateLimit: 500

  # DynamoDB Tables
  TriageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-triage-records
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      AttributeDefinitions:
        - AttributeName: triageId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: triageId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ASHA-Triage

  EmergencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-emergency-cases
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: emergencyId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: notificationStatus
          AttributeType: S
      KeySchema:
        - AttributeName: emergencyId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TimestampIndex
          KeySchema:
            - AttributeName: timestamp
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        # P0-5: GSI for querying by notification status
        - IndexName: NotificationStatusIndex
          KeySchema:
            - AttributeName: notificationStatus
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  AnalyticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-analytics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: datePartition
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DistrictDateIndex
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: datePartition
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ResponseCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-response-cache
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cacheKey
          AttributeType: S
      KeySchema:
        - AttributeName: cacheKey
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # P0-6: PHC Directory Table
  PhcDirectoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-phc-directory
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: phcId
          AttributeType: S
        - AttributeName: district
          AttributeType: S
        - AttributeName: state
          AttributeType: S
      KeySchema:
        - AttributeName: phcId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: district-state-index
          KeySchema:
            - AttributeName: district
              KeyType: HASH
            - AttributeName: state
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ASHA-Triage

  # P0-5: SNS Topic for Emergency Escalation Alerts
  EscalationSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-escalation-alerts
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # P2-1: Dead Letter Queue for Analytics Writes
  AshaAnalyticsDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-analytics-dlq
      MessageRetentionPeriod: 1209600 # 14 days in seconds
      Tags:
        - Key: Environment
          Value: !Ref Environment

  AnalyticsDlqPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AshaAnalyticsDlq
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt AshaAnalyticsDlq.Arn

  # Lambda Functions
  TriageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-triage
      CodeUri: ./dist
      Handler: handlers/triage.handler.handler
      Description: Main triage processing function
      MemorySize: 384
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_KB_ID: !Ref BedrockKnowledgeBaseId
          BEDROCK_GUARDRAIL_ID: !Ref BedrockGuardrailId
          BEDROCK_MAX_TOKENS: '400'
          BEDROCK_TEMPERATURE: '0.2'
          BEDROCK_TOP_P: '0.9'
          DYNAMODB_TRIAGE_TABLE: !Ref TriageTable
          DYNAMODB_EMERGENCY_TABLE: !Ref EmergencyTable
          DYNAMODB_ANALYTICS_TABLE: !Ref AnalyticsTable
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          S3_BUCKET_NAME: !Ref S3BucketName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TriageTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EmergencyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalyticsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}
            - Effect: Allow
              Action:
                - bedrock:Retrieve
              Resource: !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/${BedrockKnowledgeBaseId}
        - CloudWatchPutMetricPolicy: {}
      Events:
        TriagePost:
          Type: Api
          Properties:
            RestApiId: !Ref TriageApi
            Path: /triage
            Method: POST

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-login
      CodeUri: ./dist
      Handler: handlers/auth.handler.loginHandler
      Description: User login function
      MemorySize: 128
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
                - cognito-idp:GetUser
              Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}
      Events:
        LoginPost:
          Type: Api
          Properties:
            RestApiId: !Ref TriageApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-register
      CodeUri: ./dist
      Handler: handlers/auth.handler.registerHandler
      Description: User registration function
      MemorySize: 128
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
              Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}
      Events:
        RegisterPost:
          Type: Api
          Properties:
            RestApiId: !Ref TriageApi
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE

  VoiceSTTFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-voice-stt
      CodeUri: ./dist
      Handler: handlers/voice.handler.speechToTextHandler
      Description: Speech-to-text function
      MemorySize: 256
      Timeout: 60
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          TRANSCRIBE_LANGUAGE_CODE: 'hi-IN'
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref S3BucketName
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
              Resource: '*' # Transcribe jobs are dynamically named, so * is required or scoped to account.
              Condition:
                StringEquals:
                  "transcribe:OutputBucketName": !Ref S3BucketName
      Events:
        VoiceSTTPost:
          Type: Api
          Properties:
            RestApiId: !Ref TriageApi
            Path: /voice/stt
            Method: POST

  VoiceTTSFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-voice-tts
      CodeUri: ./dist
      Handler: handlers/voice.handler.textToSpeechHandler
      Description: Text-to-speech function
      MemorySize: 256
      Environment:
        Variables:
          POLLY_VOICE_ID: 'Aditi'
          POLLY_ENGINE: 'neural'
          POLLY_OUTPUT_FORMAT: 'mp3'
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
              Resource: '*' # Polly SynthesizeSpeech does not support resource-level permissions
      Events:
        VoiceTTSPost:
          Type: Api
          Properties:
            RestApiId: !Ref TriageApi
            Path: /voice/tts
            Method: POST

  EmergencyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-emergency
      CodeUri: ./dist
      Handler: handlers/emergency.handler.getEmergencyCasesHandler
      Description: Emergency case management function
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_EMERGENCY_TABLE: !Ref EmergencyTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmergencyTable
      Events:
        GetEmergencyCases:
          Type: Api
          Properties:
            RestApiId: !Ref TriageApi
            Path: /emergency/cases
            Method: GET

  # P0-5: Emergency Accept Function (for PHC doctor acknowledgement)
  EmergencyAcceptFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-emergency-accept
      CodeUri: ./dist
      Handler: handlers/emergency.handler.updateEmergencyStatusHandler
      Description: Emergency case acceptance and status update function
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_EMERGENCY_TABLE: !Ref EmergencyTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmergencyTable
      Events:
        EmergencyAcceptPost:
          Type: Api
          Properties:
            RestApiId: !Ref TriageApi
            Path: /emergency/accept
            Method: POST

  # P0-5: Escalation Checker Function
  EscalationCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-escalation-checker
      CodeUri: ./dist
      Handler: handlers/escalation-checker.handler.handler
      Description: Checks for unacknowledged emergency cases and escalates via SMS
      MemorySize: 128
      Timeout: 60
      Environment:
        Variables:
          DYNAMODB_EMERGENCY_TABLE: !Ref EmergencyTable
          ESCALATION_SNS_TOPIC_ARN: !Ref EscalationSNSTopic
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmergencyTable
        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref EscalationSNSTopic
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/doorstep-doctor/*
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: '*' # SMS publish does not use a specific topic ARN
              Condition:
                StringEquals:
                  'sns:Protocol': sms
      Events:
        ScheduledCheck:
          Type: Schedule
          Properties:
            Schedule: rate(2 minutes)
            Description: Check for unacknowledged emergency cases every 2 minutes
            Enabled: true

  # P2-2: OpenSearch Cold-Start Warm Ping
  KBWarmingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-kb-warming
      CodeUri: ./dist
      Handler: handlers/kb-warming.handler.handler
      Description: Scheduled function to prevent OpenSearch cold starts
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          BEDROCK_KNOWLEDGE_BASE_ID: !Ref BedrockKnowledgeBaseId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:Retrieve
              Resource: !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/${BedrockKnowledgeBaseId}
        - CloudWatchPutMetricPolicy: {}
      Events:
        ScheduledWarmPing:
          Type: Schedule
          Properties:
            Schedule: rate(4 hours)
            Description: Ping Bedrock KB every 4 hours to keep OpenSearch warm
            Enabled: true

  # Missing from previous codebase: Analytics Function (P2-1 / P2-7 / P3-4)
  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-analytics
      CodeUri: ./dist
      Handler: handlers/analytics.handler.getAnalyticsHandler
      Description: API handler for analytics reporting
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_ANALYTICS_TABLE: !Ref AnalyticsTable

  # P3-2: Stream Processor for Analytics
  StreamProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-stream-processor
      CodeUri: ./dist
      Handler: handlers/stream-processor.handler.handler
      Description: Processes TriageTable streams and updates aggregated analytics
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_ANALYTICS_TABLE: !Ref AnalyticsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalyticsTable
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt TriageTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 100
            MaximumBatchingWindowInSeconds: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AnalyticsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AshaAnalyticsDlq.QueueName
      EventInvokeConfig:
        DestinationConfig:
          OnFailure:
            Type: SQS
            Destination: !GetAtt AshaAnalyticsDlq.Arn
      Events:
        GetAnalytics:
          Type: Api
          Properties:
            RestApiId: !Ref TriageApi
            Path: /analytics
            Method: GET

  # CloudWatch Log Groups
  TriageFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${TriageFunction}
      RetentionInDays: 30

  LoginFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LoginFunction}
      RetentionInDays: 30

  # CloudWatch Alarms
  TriageFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-triage-errors
      AlarmDescription: Alert when triage function has high error rate
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref TriageFunction

  TriageFunctionLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-triage-latency
      AlarmDescription: Alert when triage function exceeds 2 second target
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref TriageFunction

  # P0-1: RAG Zero Result Alarm
  RagZeroResultAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-rag-zero-results
      AlarmDescription: >-
        Alert when RAG returns 0 documents more than 5 times in 10 minutes.
        This indicates a Knowledge Base coverage gap that needs filling.
      MetricName: rag_zero_result_count
      Namespace: ASHA-Triage
      Statistic: Sum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # P0-4: Low Confidence Triage Alarm
  LowConfidenceTriageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-low-confidence-triage
      AlarmDescription: >-
        Alert when low-confidence triages exceed 10 in 30 minutes.
        Indicates model degradation or prompt drift.
      MetricName: low_confidence_triage_count
      Namespace: ASHA-Triage
      Statistic: Sum
      Period: 1800
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # P0-2: JSON Repair Alarm
  JsonRepairAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-json-repair
      AlarmDescription: >-
        Alert when JSON repair attempts exceed 20 in 30 minutes.
        Indicates Claude output quality degradation.
      MetricName: bedrock_json_repair_attempts
      Namespace: ASHA-Triage
      Statistic: Sum
      Period: 1800
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # P2-1: DLQ Depth Alarm
  AshaAnalyticsDlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-analytics-dlq-depth
      AlarmDescription: Alert when the Analytics DLQ has more than 10 messages. Indicates failed analytics writes.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AshaAnalyticsDlq.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${TriageApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-api-endpoint

  TriageTableName:
    Description: DynamoDB triage table name
    Value: !Ref TriageTable
    Export:
      Name: !Sub ${AWS::StackName}-triage-table

  EmergencyTableName:
    Description: DynamoDB emergency table name
    Value: !Ref EmergencyTable
    Export:
      Name: !Sub ${AWS::StackName}-emergency-table

  AnalyticsTableName:
    Description: DynamoDB analytics table name
    Value: !Ref AnalyticsTable
    Export:
      Name: !Sub ${AWS::StackName}-analytics-table

  PhcDirectoryTableName:
    Description: DynamoDB PHC directory table name
    Value: !Ref PhcDirectoryTable
    Export:
      Name: !Sub ${AWS::StackName}-phc-directory-table

  EscalationSNSTopicArn:
    Description: SNS topic ARN for emergency escalation alerts
    Value: !Ref EscalationSNSTopic
    Export:
      Name: !Sub ${AWS::StackName}-escalation-topic
